<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MovieMood Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ─── VARIABLES ─── */
:root {
  --bg:       #080810;
  --surface:  #10101e;
  --surface2: #181828;
  --border:   rgba(255,255,255,0.07);
  --accent:   #e8b84b;
  --accent2:  #c0392b;
  --text:     #f0f0f0;
  --muted:    #888;
  --radius:   12px;
  --card-w:   160px;
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── NOISE OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  z-index: 0;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 28px;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 2px;
  color: var(--accent);
  white-space: nowrap;
}
.logo span { color: var(--text); }

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 420px;
}
.search-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
#search {
  width: 100%;
  padding: 10px 14px 10px 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.9rem;
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

/* ─── SECTIONS ─── */
.section { padding: 0 28px 36px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.section-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.55rem;
  letter-spacing: 1.5px;
  color: var(--text);
}
.section-header .badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  background: var(--accent);
  color: #000;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: .5px;
}

/* ─── ROW SCROLL ─── */
.row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.row::-webkit-scrollbar { height: 4px; }
.row::-webkit-scrollbar-track { background: transparent; }
.row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ─── CARD ─── */
.card {
  min-width: var(--card-w);
  width: var(--card-w);
  scroll-snap-align: start;
  cursor: pointer;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  transition: transform .22s ease, box-shadow .22s ease;
  position: relative;
  flex-shrink: 0;
}
.card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  z-index: 2;
}
.card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  transition: filter .22s;
}
.card:hover img { filter: brightness(0.75); }

.card-info {
  padding: 8px 10px;
}
.card-title {
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.card-meta {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}
.card-rating {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 7px;
  color: var(--accent);
  opacity: 0;
  transition: opacity .2s;
}
.card:hover .card-rating { opacity: 1; }

/* ─── SKELETON LOADING ─── */
.skeleton {
  min-width: var(--card-w);
  width: var(--card-w);
  flex-shrink: 0;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.skeleton-img {
  width: 100%;
  aspect-ratio: 2/3;
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.skeleton-line {
  height: 10px;
  margin: 8px 10px 4px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.skeleton-line.short { width: 60%; margin-bottom: 10px; }

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── MODAL ─── */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: flex-start;
  z-index: 999;
  padding: 24px 16px;
  overflow-y: auto;
  animation: fadeIn .2s ease;
}
#modal.open { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  max-width: 860px;
  width: 100%;
  overflow: hidden;
  position: relative;
  animation: slideUp .25s ease;
  margin: auto;
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-hero {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
}
.modal-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.45);
}
.modal-hero-grad {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--surface) 0%, transparent 60%);
}
.modal-hero-content {
  position: absolute;
  bottom: 20px;
  left: 24px;
  right: 24px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 1px;
  line-height: 1.1;
}
.modal-tagline {
  color: var(--accent);
  font-size: 0.85rem;
  margin-top: 4px;
  font-style: italic;
}

.modal-body { padding: 0 24px 24px; }

.modal-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin: 16px 0;
}
.meta-pill {
  padding: 5px 14px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.meta-pill.accent { background: var(--accent); color: #000; border-color: transparent; }

.modal-overview {
  font-size: 0.9rem;
  line-height: 1.65;
  color: #ccc;
  margin-bottom: 20px;
  max-width: 680px;
}

.modal-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 12px;
}

/* Cast row */
.cast-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 24px;
  padding-bottom: 6px;
}
.cast-card {
  min-width: 70px;
  text-align: center;
  flex-shrink: 0;
}
.cast-card img, .cast-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--surface2);
  display: block;
  margin: 0 auto 5px;
}
.cast-avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
}
.cast-name {
  font-size: 0.68rem;
  line-height: 1.2;
  color: #bbb;
  text-align: center;
}

/* Trailer button */
.trailer-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: var(--accent2);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: filter .2s;
  margin-bottom: 20px;
}
.trailer-btn:hover { filter: brightness(1.2); }

/* Rec grid inside modal */
.rec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
  margin-bottom: 8px;
}
.rec-card {
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative;
}
.rec-card:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  border-color: var(--accent);
}
.rec-card-poster {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  overflow: hidden;
}
.rec-card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.rec-card:hover .rec-card-poster img { transform: scale(1.08); }
.rec-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
  opacity: 0;
  transition: opacity .2s;
  display: flex;
  align-items: flex-end;
  padding: 8px;
}
.rec-card:hover .rec-card-overlay { opacity: 1; }
.rec-card-play {
  font-size: 0.72rem;
  color: #fff;
  background: var(--accent2);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.rec-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  border-radius: 5px;
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 5px;
  color: var(--accent);
}
.rec-card-info {
  padding: 7px 9px 9px;
}
.rec-card-title {
  font-size: 0.74rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.rec-card-year {
  font-size: 0.64rem;
  color: var(--muted);
  margin-top: 3px;
}
.rec-empty {
  padding: 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  background: var(--surface2);
  border-radius: 10px;
  border: 1px dashed var(--border);
}

/* Close btn */
.close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border);
  color: white;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background .2s;
}
.close-btn:hover { background: rgba(255,255,255,0.15); }

/* ─── SEARCH RESULTS ─── */
#search-section { display: none; }
#search-section.visible { display: block; }

/* ─── TOAST ─── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #222;
  border: 1px solid var(--border);
  color: #fff;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 0.85rem;
  z-index: 9999;
  transition: transform .3s ease, opacity .3s;
  opacity: 0;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ─── WATCHLIST BUTTON ─── */
.watchlist-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .2s, background .2s;
}
.watchlist-btn:hover { border-color: var(--accent); background: var(--surface); }
.wl-count {
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 0.7rem;
  border-radius: 999px;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}

/* ─── WATCHLIST PANEL ─── */
#wlBackdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  backdrop-filter: blur(4px);
}
#wlBackdrop.open { display: block; }

#watchlistPanel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  max-width: 95vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 201;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
}
#watchlistPanel.open { right: 0; }

.wl-panel-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.wl-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.wl-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 1px;
}
.wl-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.wl-close:hover { background: var(--surface2); }

.wl-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-align: center;
  padding: 40px 20px;
  gap: 8px;
}

.wl-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
}
.wl-grid::-webkit-scrollbar { width: 4px; }
.wl-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.wl-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, border-color .2s;
  position: relative;
}
.wl-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.wl-card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}
.wl-card-info { padding: 7px 8px 9px; }
.wl-card-title {
  font-size: 0.74rem;
  font-weight: 500;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.wl-card-year { font-size: 0.64rem; color: var(--muted); margin-top: 2px; }
.wl-remove {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(0,0,0,0.75);
  border: none;
  color: #fff;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  font-size: 0.7rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .2s;
}
.wl-card:hover .wl-remove { opacity: 1; }

.wl-clear {
  margin: 0 16px 16px;
  padding: 10px;
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.3);
  color: #e74c3c;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.82rem;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
}
.wl-clear:hover { background: rgba(192,57,43,0.25); }

/* ─── WATCHLIST BOOKMARK on modal ─── */
.wl-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 20px;
  margin-right: 10px;
}
.wl-toggle-btn:hover { border-color: var(--accent); }
.wl-toggle-btn.saved { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  header { padding: 12px 16px; }
  .logo { font-size: 1.4rem; }
  .section { padding: 0 16px 28px; }
  :root { --card-w: 130px; }
  .modal-title { font-size: 1.6rem; }
  .modal-hero { height: 200px; }
  .watchlist-btn span.wl-count { display: inline; }
  #watchlistPanel { width: 100vw; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🎬 Movie<span>Mood</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Search movies…" autocomplete="off" />
  </div>
  <button class="watchlist-btn" onclick="toggleWatchlistPanel()" id="watchlistBtn">
    🔖 Watchlist <span class="wl-count" id="wlCount">0</span>
  </button>
</header>

<!-- WATCHLIST PANEL -->
<div id="watchlistPanel">
  <div class="wl-panel-inner">
    <div class="wl-header">
      <div class="wl-title">🔖 My Watchlist</div>
      <button class="wl-close" onclick="toggleWatchlistPanel()">✕</button>
    </div>
    <div id="wlEmpty" class="wl-empty">
      <div style="font-size:2.5rem">🎬</div>
      <p>No movies saved yet.</p>
      <p style="font-size:.78rem;color:var(--muted);margin-top:4px">Click the bookmark on any movie to save it.</p>
    </div>
    <div id="wlGrid" class="wl-grid"></div>
    <button id="wlClearBtn" class="wl-clear" onclick="clearWatchlist()" style="display:none">🗑 Clear All</button>
  </div>
</div>
<div id="wlBackdrop" onclick="toggleWatchlistPanel()"></div>

<!-- SEARCH RESULTS (hidden until query) -->
<section class="section" id="search-section">
  <div class="section-header">
    <h2>🔍 Search Results</h2>
    <span class="badge" id="search-count"></span>
  </div>
  <div id="searchRow" class="row"></div>
</section>

<!-- MAIN SECTIONS -->
<div id="main-sections">
  <section class="section">
    <div class="section-header"><h2>🔥 Trending</h2><span class="badge">LIVE</span></div>
    <div id="trending" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>⭐ Top Rated</h2></div>
    <div id="top" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>😊 Feel Good</h2></div>
    <div id="happy" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>💔 Emotional</h2></div>
    <div id="sad" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>😱 Thriller</h2></div>
    <div id="thriller" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>❤️ Romantic</h2></div>
    <div id="romantic" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>🚀 Sci-Fi</h2></div>
    <div id="scifi" class="row"></div>
  </section>

  <section class="section">
    <div class="section-header"><h2>🎬 Bollywood & South</h2></div>
    <div id="indian" class="row"></div>
  </section>
</div>

<!-- MODAL -->
<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-box" id="modalBox">
    <button class="close-btn" onclick="closeModal()" aria-label="Close">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── CONFIG ───
// Relative API path - works on any host/port
const API = "/api";
const IMG = "https://image.tmdb.org/t/p/w500";
const IMG_BIG = "https://image.tmdb.org/t/p/w1280";

// ─── UTILITIES ───
function toast(msg, dur = 3000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

function skeletons(n = 8) {
  return Array.from({ length: n }, () => `
    <div class="skeleton">
      <div class="skeleton-img"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>
  `).join("");
}

async function apiFetch(path) {
  try {
    const r = await fetch(path, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error("Fetch error:", path, e.message);
    return null;
  }
}

// ─── RENDER ROW ───
function render(id, data) {
  const el = document.getElementById(id);
  if (!el) return;

  if (!data || data.length === 0) {
    el.innerHTML = `<p style="color:var(--muted);padding:10px 0;font-size:.85rem">Nothing to show here.</p>`;
    return;
  }

  el.innerHTML = "";
  data.filter(m => m.poster_path).forEach(m => {
    const year = m.release_date ? m.release_date.slice(0, 4) : "";
    const rating = m.vote_average ? m.vote_average.toFixed(1) : "";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="card-rating">⭐ ${rating}</div>
      <img src="${IMG + m.poster_path}" alt="${m.title}" loading="lazy">
      <div class="card-info">
        <div class="card-title">${m.title || m.name}</div>
        <div class="card-meta">${year}</div>
      </div>
    `;
    div.addEventListener("click", () => openModal(m.id));
    el.appendChild(div);
  });
}

// ─── MODAL ───
async function openModal(movieId) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  // Show loading state
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
  content.innerHTML = `
    <div style="height:280px;background:var(--surface2);display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:8px;animation:spin 1s linear infinite;display:inline-block">⟳</div>
        <div>Loading…</div>
      </div>
    </div>
    <div style="padding:24px">
      <div class="skeleton-line" style="width:55%;height:30px;margin-bottom:12px"></div>
      <div class="skeleton-line" style="width:100%;height:12px"></div>
      <div class="skeleton-line" style="width:88%;height:12px"></div>
      <div class="skeleton-line" style="width:70%;height:12px"></div>
    </div>
  `;

  const d = await apiFetch(`${API}/movie/${movieId}`);
  if (!d || !d.details?.title) {
    content.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
      <div style="font-size:2rem">😕</div>
      <p style="margin-top:8px">Could not load movie details.</p>
    </div>`;
    return;
  }

  const { details, recommendations, cast, crew, trailerKey } = d;
  const genres = (details.genres || []).map(g =>
    `<span class="meta-pill">${g.name}</span>`
  ).join("");
  const year = details.release_date?.slice(0, 4) || "";
  const runtime = details.runtime ? `${Math.floor(details.runtime / 60)}h ${details.runtime % 60}m` : "";

  const castHTML = cast.length ? `
    <div class="modal-section-title">CAST</div>
    <div class="cast-row">
      ${cast.map(c => `
        <div class="cast-card">
          ${c.profile_path
            ? `<img src="https://image.tmdb.org/t/p/w185${c.profile_path}" alt="${c.name}">`
            : `<div class="cast-avatar">🎭</div>`}
          <div class="cast-name">${c.name}</div>
          ${c.character ? `<div class="cast-name" style="color:var(--muted);font-size:.6rem">${c.character}</div>` : ""}
        </div>
      `).join("")}
    </div>
  ` : "";

  const crewHTML = crew?.length ? `
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin:4px 0 20px">
      ${crew.map(c => `
        <div>
          <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${c.job}</div>
          <div style="font-size:.82rem;font-weight:500">${c.name}</div>
        </div>
      `).join("")}
    </div>
  ` : "";

  // Filter recs that have poster
  const validRecs = (recommendations || []).filter(r => r.poster_path);

  const recsHTML = validRecs.length ? `
    <div class="modal-section-title" style="margin-top:8px">
      🎯 BECAUSE YOU LIKED THIS
      <span style="font-size:.7rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;margin-left:8px">${validRecs.length} picks</span>
    </div>
    <div class="rec-grid">
      ${validRecs.map(r => {
        const ry = r.release_date ? r.release_date.slice(0,4) : "";
        const rr = r.vote_average ? r.vote_average.toFixed(1) : "";
        return `
          <div class="rec-card" onclick="openModal(${r.id})">
            <div class="rec-card-poster">
              <img src="${IMG + r.poster_path}" alt="${r.title}" loading="lazy">
              ${rr ? `<div class="rec-badge">⭐ ${rr}</div>` : ""}
              <div class="rec-card-overlay">
                <span class="rec-card-play">▶ View</span>
              </div>
            </div>
            <div class="rec-card-info">
              <div class="rec-card-title">${r.title}</div>
              ${ry ? `<div class="rec-card-year">${ry}</div>` : ""}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  ` : `<div class="rec-empty">No similar movies found for this title.</div>`;

  const backdropSrc = details.backdrop_path
    ? IMG_BIG + details.backdrop_path
    : (details.poster_path ? IMG + details.poster_path : "");

  content.innerHTML = `
    <div class="modal-hero">
      ${backdropSrc ? `<img src="${backdropSrc}" alt="${details.title}">` : ""}
      <div class="modal-hero-grad"></div>
      <div class="modal-hero-content">
        <div class="modal-title">${details.title}</div>
        ${details.tagline ? `<div class="modal-tagline">"${details.tagline}"</div>` : ""}
      </div>
    </div>

    <div class="modal-body">
      <div class="modal-meta-row">
        ${details.vote_average ? `<span class="meta-pill accent">⭐ ${details.vote_average.toFixed(1)}</span>` : ""}
        ${year ? `<span class="meta-pill">${year}</span>` : ""}
        ${runtime ? `<span class="meta-pill">⏱ ${runtime}</span>` : ""}
        ${genres}
      </div>

      ${details.overview ? `<p class="modal-overview">${details.overview}</p>` : ""}

      ${crewHTML}

      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
        ${trailerKey ? `
          <a class="trailer-btn" href="https://www.youtube.com/watch?v=${trailerKey}" target="_blank" rel="noopener">
            ▶ Watch Trailer
          </a>
        ` : ""}
        <button class="wl-toggle-btn" id="wlModalBtn" data-id="${details.id}"
          onclick="toggleWatchlist({id:${details.id},title:${JSON.stringify(details.title)},poster_path:${JSON.stringify(details.poster_path)},release_date:${JSON.stringify(details.release_date||'')}})">
          🔖 Add to Watchlist
        </button>
      </div>
      ${castHTML}
      ${recsHTML}
    </div>
  `;

  // Update watchlist button state
  const wlBtn = document.getElementById("wlModalBtn");
  if (wlBtn) updateWlModalBtn(wlBtn, details.id);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

// Close on backdrop click
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

// Close on ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

// Spin keyframe
const style = document.createElement("style");
style.textContent = "@keyframes spin { to { transform: rotate(360deg); } }";
document.head.appendChild(style);

// ─── WATCHLIST ───
const WL_KEY = "moviemood_watchlist";

function getWatchlist() {
  try { return JSON.parse(localStorage.getItem(WL_KEY)) || []; }
  catch { return []; }
}

function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
  updateWlCount();
  renderWatchlistPanel();
}

function isInWatchlist(id) {
  return getWatchlist().some(m => m.id === id);
}

function toggleWatchlist(movie) {
  let list = getWatchlist();
  if (isInWatchlist(movie.id)) {
    list = list.filter(m => m.id !== movie.id);
    toast("Removed from Watchlist");
  } else {
    list.unshift(movie); // add to top
    toast("✅ Added to Watchlist!");
  }
  saveWatchlist(list);
  // Update button if modal is open for this movie
  const btn = document.getElementById("wlModalBtn");
  if (btn && parseInt(btn.dataset.id) === movie.id) {
    updateWlModalBtn(btn, movie.id);
  }
}

function removeFromWatchlist(id) {
  saveWatchlist(getWatchlist().filter(m => m.id !== id));
}

function clearWatchlist() {
  if (confirm("Clear your entire watchlist?")) {
    saveWatchlist([]);
    toast("Watchlist cleared");
  }
}

function updateWlCount() {
  const n = getWatchlist().length;
  document.getElementById("wlCount").textContent = n;
}

function updateWlModalBtn(btn, movieId) {
  const saved = isInWatchlist(movieId);
  btn.textContent = saved ? "🔖 Saved" : "🔖 Add to Watchlist";
  btn.classList.toggle("saved", saved);
}

function renderWatchlistPanel() {
  const list    = getWatchlist();
  const grid    = document.getElementById("wlGrid");
  const empty   = document.getElementById("wlEmpty");
  const clearBtn = document.getElementById("wlClearBtn");

  if (list.length === 0) {
    empty.style.display = "flex";
    grid.style.display  = "none";
    clearBtn.style.display = "none";
    grid.innerHTML = "";
    return;
  }

  empty.style.display = "none";
  grid.style.display  = "grid";
  clearBtn.style.display = "block";

  grid.innerHTML = list.map(m => `
    <div class="wl-card" onclick="openModal(${m.id})">
      <img src="${IMG + m.poster_path}" alt="${m.title}" loading="lazy">
      <button class="wl-remove" onclick="event.stopPropagation(); removeFromWatchlist(${m.id})" title="Remove">✕</button>
      <div class="wl-card-info">
        <div class="wl-card-title">${m.title}</div>
        <div class="wl-card-year">${m.release_date?.slice(0,4) || ""}</div>
      </div>
    </div>
  `).join("");
}

function toggleWatchlistPanel() {
  const panel    = document.getElementById("watchlistPanel");
  const backdrop = document.getElementById("wlBackdrop");
  const isOpen   = panel.classList.contains("open");
  panel.classList.toggle("open", !isOpen);
  backdrop.classList.toggle("open", !isOpen);
  document.body.style.overflow = isOpen ? "" : "hidden";
  if (!isOpen) renderWatchlistPanel();
}

// Init count on load
updateWlCount();
let searchTimer;
const searchSection = document.getElementById("search-section");
const mainSections  = document.getElementById("main-sections");

document.getElementById("search").addEventListener("input", e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();

  if (q.length < 2) {
    searchSection.classList.remove("visible");
    mainSections.style.display = "";
    document.getElementById("searchRow").innerHTML = "";
    return;
  }

  // Show skeleton while waiting
  searchSection.classList.add("visible");
  mainSections.style.display = "none";
  document.getElementById("searchRow").innerHTML = skeletons(6);

  searchTimer = setTimeout(async () => {
    const data = await apiFetch(`${API}/search?q=${encodeURIComponent(q)}`);
    if (data === null) {
      toast("Search failed. Check your connection.");
      return;
    }
    const countEl = document.getElementById("search-count");
    countEl.textContent = data.length ? `${data.length} results` : "";
    render("searchRow", data);
    if (!data.length) {
      document.getElementById("searchRow").innerHTML =
        `<p style="color:var(--muted);font-size:.85rem">No results for "<strong>${q}</strong>"</p>`;
    }
  }, 380);
});

// ─── LOAD SECTION ───
async function loadSection(elId, endpoint) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = skeletons();
  const data = await apiFetch(`${API}${endpoint}`);
  if (data === null) {
    el.innerHTML = `<p style="color:var(--muted);font-size:.85rem;padding:10px 0">Failed to load.</p>`;
    return;
  }
  render(elId, data);
}

// ─── INIT ───
(async () => {
  // Load in parallel, prioritise trending first
  loadSection("trending",  "/trending");
  loadSection("top",       "/top");
  loadSection("happy",     "/mood/happy");
  loadSection("sad",       "/mood/sad");
  loadSection("thriller",  "/mood/thriller");
  loadSection("romantic",  "/mood/romantic");
  loadSection("scifi",     "/mood/scifi");
  loadSection("indian",    "/movies");
})();
</script>
</body>
</html>
